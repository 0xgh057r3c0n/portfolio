<!-- In your blog.html file -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
</head>
<body>
    <h1>Latest Blog Post from Medium</h1>

    <div id="medium-feed"></div>

    <script>
        // Fetch the Medium RSS feed
        const feedUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@gauravbhattacharjee443";
        
        fetch(feedUrl)
            .then(response => response.json())
            .then(data => {
                const posts = data.items;
                const feedDiv = document.getElementById('medium-feed');
                let feedContent = '<ul>';

                posts.forEach(post => {
                    feedContent += `<li><a href="${post.link}" target="_blank">${post.title}</a></li>`;
                });

                feedContent += '</ul>';
                feedDiv.innerHTML = feedContent;
            })
            .catch(error => {
                console.error('Error fetching Medium feed:', error);
            });
    </script>
</body>
</html>
